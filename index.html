<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Space ✦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #e8c5a0;
    --accent2: #c9b8f0;
    --glass: rgba(255,255,255,0.18);
    --glass-border: rgba(255,255,255,0.3);
    --text-main: #2a1f14;
    --text-light: rgba(255,255,255,0.92);
    --text-muted: rgba(255,255,255,0.65);
    --card-bg: rgba(255,255,255,0.15);
    --card-border: rgba(255,255,255,0.25);
    --input-bg: rgba(255,255,255,0.2);
    --shadow: 0 8px 32px rgba(0,0,0,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background: #b8a89a;
    transition: background 0.8s ease;
    color: var(--text-light);
  }

  body.bg-1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%); }
  body.bg-2 { background: linear-gradient(135deg, #f6d365 0%, #fda085 50%, #f093fb 100%); }
  body.bg-3 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 50%, #43e97b 100%); }
  body.bg-4 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }
  body.bg-5 { background: linear-gradient(135deg, #a8edea 0%, #fed6e3 50%, #d299c2 100%); }
  body.bg-6 { background: linear-gradient(135deg, #30cfd0 0%, #330867 100%); }
  body.bg-7 { background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%); }
  body.bg-8 { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); }

  body.bg-5 { --text-light: rgba(60,30,80,0.95); --text-muted: rgba(60,30,80,0.65); --card-bg: rgba(255,255,255,0.35); --card-border: rgba(255,255,255,0.55); --glass: rgba(255,255,255,0.3); }
  body.bg-8 { --text-light: rgba(40,20,70,0.95); --text-muted: rgba(40,20,70,0.6); --card-bg: rgba(255,255,255,0.35); --card-border: rgba(255,255,255,0.55); }

  .noise-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity: 0.4;
  }

  .page-wrapper {
    position: relative; z-index: 1;
    max-width: 1100px; margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
  }

  /* ── HEADER ── */
  .header {
    text-align: center; margin-bottom: 2.5rem;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.4rem, 5vw, 3.6rem);
    font-weight: 600; letter-spacing: -0.01em;
    text-shadow: 0 2px 20px rgba(0,0,0,0.25);
    line-height: 1.1;
  }
  .header h1 em { font-style: italic; }
  .header p {
    margin-top: 0.5rem; font-size: 0.95rem;
    color: var(--text-muted); font-weight: 300; letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .dot { display: inline-block; margin: 0 6px; opacity: 0.5; font-size: 0.7em; }

  /* ── TOP BAR ── */
  .top-bar {
    display: flex; flex-wrap: wrap; gap: 1rem;
    align-items: center; justify-content: space-between;
    background: var(--glass); border: 1px solid var(--glass-border);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-radius: 20px; padding: 1rem 1.4rem;
    margin-bottom: 2rem;
    box-shadow: var(--shadow);
  }
  .top-bar-section { display: flex; align-items: center; gap: 0.8rem; flex-wrap: wrap; }
  .top-bar label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); }

  /* bg picker */
  .bg-swatches { display: flex; gap: 6px; flex-wrap: wrap; }
  .bg-swatch {
    width: 28px; height: 28px; border-radius: 50%; cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.2s, border-color 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .bg-swatch:hover { transform: scale(1.15); }
  .bg-swatch.active { border-color: white; transform: scale(1.15); }
  .sw1 { background: linear-gradient(135deg, #667eea, #f093fb); }
  .sw2 { background: linear-gradient(135deg, #f6d365, #fda085); }
  .sw3 { background: linear-gradient(135deg, #4facfe, #43e97b); }
  .sw4 { background: linear-gradient(135deg, #fa709a, #fee140); }
  .sw5 { background: linear-gradient(135deg, #a8edea, #d299c2); }
  .sw6 { background: linear-gradient(135deg, #30cfd0, #330867); }
  .sw7 { background: linear-gradient(135deg, #0f0c29, #24243e); }
  .sw8 { background: linear-gradient(135deg, #e0c3fc, #8ec5fc); }

  /* spotify */
  .spotify-row {
    display: flex; align-items: center; gap: 0.5rem;
  }
  .spotify-input {
    background: var(--input-bg); border: 1px solid var(--card-border);
    border-radius: 10px; padding: 6px 12px;
    color: var(--text-light); font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
    width: 200px; outline: none; transition: border-color 0.2s;
    backdrop-filter: blur(8px);
  }
  .spotify-input::placeholder { color: var(--text-muted); }
  .spotify-input:focus { border-color: rgba(255,255,255,0.6); }
  .spotify-btn {
    background: #1DB954; border: none; border-radius: 10px;
    padding: 6px 14px; color: white; font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem; font-weight: 500; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s; white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .spotify-btn:hover { opacity: 0.88; transform: scale(1.03); }
  .spotify-link-display {
    margin-top: 0.5rem; font-size: 0.8rem; color: var(--text-muted);
    display: none;
  }
  .spotify-link-display a { color: #1DB954; text-decoration: none; font-weight: 500; }

  /* date */
  .date-display {
    font-family: 'DM Mono', monospace;
    font-size: 0.82rem; color: var(--text-muted);
    letter-spacing: 0.04em;
  }

  /* ── POMODORO GLOBAL ── */
  .pomo-global {
    background: var(--glass); border: 1px solid var(--glass-border);
    backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
    border-radius: 20px; padding: 1.2rem 1.6rem;
    margin-bottom: 2rem;
    box-shadow: var(--shadow);
    display: flex; flex-wrap: wrap; align-items: center; gap: 1.2rem;
  }
  .pomo-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem; font-style: italic; color: var(--text-light);
  }
  .pomo-timer-display {
    font-family: 'DM Mono', monospace;
    font-size: 2rem; font-weight: 500; letter-spacing: 0.05em;
    color: var(--accent); text-shadow: 0 0 20px rgba(232,197,160,0.4);
    min-width: 90px; text-align: center;
  }
  .pomo-controls { display: flex; align-items: center; gap: 0.5rem; }
  .pomo-btn {
    background: rgba(255,255,255,0.15); border: 1px solid var(--card-border);
    border-radius: 10px; padding: 6px 14px; color: var(--text-light);
    font-family: 'DM Sans', sans-serif; font-size: 0.82rem; cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    backdrop-filter: blur(6px);
  }
  .pomo-btn:hover { background: rgba(255,255,255,0.25); }
  .pomo-btn:active { transform: scale(0.97); }
  .pomo-btn.primary { background: rgba(232,197,160,0.3); border-color: rgba(232,197,160,0.5); }
  .pomo-select {
    background: var(--input-bg); border: 1px solid var(--card-border);
    border-radius: 10px; padding: 6px 10px;
    color: var(--text-light); font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
    outline: none; cursor: pointer; backdrop-filter: blur(8px);
  }
  .pomo-select option { background: #4a3060; color: white; }
  .pomo-phase {
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted); font-weight: 400;
  }
  .pomo-progress-ring { position: relative; width: 56px; height: 56px; }
  .pomo-progress-ring svg { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .pomo-ring-bg { fill: none; stroke: rgba(255,255,255,0.15); stroke-width: 3; }
  .pomo-ring-fg { fill: none; stroke: var(--accent); stroke-width: 3; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
  .pomo-ring-label {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--accent); font-weight: 500;
  }

  /* ── SCHEDULE GRID ── */
  .schedule-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1.2rem;
  }
  .schedule-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem; font-weight: 600;
  }
  .save-btn {
    background: rgba(255,255,255,0.15); border: 1px solid var(--card-border);
    border-radius: 12px; padding: 8px 18px; color: var(--text-light);
    font-family: 'DM Sans', sans-serif; font-size: 0.85rem; cursor: pointer;
    transition: background 0.2s; font-weight: 500;
  }
  .save-btn:hover { background: rgba(255,255,255,0.25); }
  .save-btn.saved { background: rgba(100,200,130,0.25); border-color: rgba(100,200,130,0.4); }

  .periods-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 1.2rem;
  }

  /* ── PERIOD CARD ── */
  .period-card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
    border-radius: 20px;
    padding: 1.3rem 1.4rem;
    box-shadow: var(--shadow);
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; flex-direction: column; gap: 0.9rem;
  }
  .period-card:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.22); }

  .period-top {
    display: flex; align-items: center; justify-content: space-between;
  }
  .period-badge {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-muted);
    background: rgba(255,255,255,0.12);
    padding: 3px 10px; border-radius: 20px;
  }
  .period-pomo-mini {
    display: flex; align-items: center; gap: 6px;
  }
  .mini-timer { font-family: 'DM Mono', monospace; font-size: 0.8rem; color: var(--accent); }
  .mini-btn {
    background: none; border: 1px solid rgba(255,255,255,0.25); border-radius: 8px;
    padding: 2px 8px; font-size: 0.72rem; color: var(--text-light);
    cursor: pointer; transition: background 0.15s;
  }
  .mini-btn:hover { background: rgba(255,255,255,0.15); }
  .mini-btn.running { background: rgba(232,197,160,0.2); border-color: rgba(232,197,160,0.4); }

  .class-name-input {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem; font-weight: 600;
    background: transparent; border: none;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    color: var(--text-light); width: 100%;
    outline: none; padding-bottom: 4px;
    transition: border-color 0.2s;
  }
  .class-name-input::placeholder { color: var(--text-muted); font-style: italic; font-weight: 400; }
  .class-name-input:focus { border-bottom-color: rgba(255,255,255,0.5); }

  .time-row { display: flex; gap: 8px; align-items: center; }
  .time-input {
    background: var(--input-bg); border: 1px solid var(--card-border);
    border-radius: 8px; padding: 4px 8px;
    color: var(--text-light); font-family: 'DM Mono', monospace; font-size: 0.78rem;
    outline: none; width: 80px; transition: border-color 0.2s;
    backdrop-filter: blur(6px);
  }
  .time-input:focus { border-color: rgba(255,255,255,0.5); }
  .time-label { font-size: 0.75rem; color: var(--text-muted); }

  .teacher-input {
    background: var(--input-bg); border: 1px solid var(--card-border);
    border-radius: 8px; padding: 5px 10px;
    color: var(--text-light); font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
    outline: none; width: 100%; transition: border-color 0.2s;
    backdrop-filter: blur(6px);
  }
  .teacher-input::placeholder { color: var(--text-muted); }
  .teacher-input:focus { border-color: rgba(255,255,255,0.5); }

  .notes-label {
    font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--text-muted); margin-bottom: 4px;
  }
  .notes-area {
    background: rgba(0,0,0,0.12); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 12px; padding: 10px 12px;
    color: var(--text-light); font-family: 'DM Sans', sans-serif; font-size: 0.85rem;
    resize: vertical; min-height: 80px; outline: none;
    line-height: 1.6; width: 100%; transition: border-color 0.2s;
    font-weight: 300;
  }
  .notes-area::placeholder { color: var(--text-muted); }
  .notes-area:focus { border-color: rgba(255,255,255,0.35); }

  .todo-section { display: flex; flex-direction: column; gap: 5px; }
  .todo-row { display: flex; align-items: center; gap: 6px; }
  .todo-check {
    width: 16px; height: 16px; cursor: pointer;
    accent-color: var(--accent2); flex-shrink: 0;
  }
  .todo-text {
    background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.15);
    color: var(--text-light); font-family: 'DM Sans', sans-serif; font-size: 0.82rem;
    outline: none; flex: 1; padding: 2px 0; transition: border-color 0.2s;
  }
  .todo-text::placeholder { color: var(--text-muted); }
  .todo-text:focus { border-bottom-color: rgba(255,255,255,0.4); }
  .todo-text.done { text-decoration: line-through; opacity: 0.5; }
  .todo-del {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    font-size: 0.9rem; padding: 0 2px; transition: color 0.15s; line-height: 1;
  }
  .todo-del:hover { color: rgba(255,140,140,0.8); }
  .add-todo-btn {
    background: none; border: 1px dashed rgba(255,255,255,0.25); border-radius: 8px;
    padding: 4px 10px; color: var(--text-muted); font-size: 0.75rem;
    cursor: pointer; text-align: left; transition: border-color 0.2s, color 0.2s;
    font-family: 'DM Sans', sans-serif;
  }
  .add-todo-btn:hover { border-color: rgba(255,255,255,0.45); color: var(--text-light); }

  /* ── FOOTER ── */
  .footer {
    text-align: center; margin-top: 3rem;
    font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.08em;
  }
  .footer span { opacity: 0.5; }

  /* ── NOTIFICATION ── */
  .notif {
    position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(100px);
    background: rgba(30,20,50,0.9); backdrop-filter: blur(16px);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 14px;
    padding: 12px 22px; color: white; font-size: 0.85rem; font-weight: 500;
    z-index: 999; transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
  }
  .notif.show { transform: translateX(-50%) translateY(0); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .period-card { animation: fadeUp 0.4s ease both; }
  .period-card:nth-child(1) { animation-delay: 0.05s; }
  .period-card:nth-child(2) { animation-delay: 0.10s; }
  .period-card:nth-child(3) { animation-delay: 0.15s; }
  .period-card:nth-child(4) { animation-delay: 0.20s; }
  .period-card:nth-child(5) { animation-delay: 0.25s; }
  .period-card:nth-child(6) { animation-delay: 0.30s; }
  .period-card:nth-child(7) { animation-delay: 0.35s; }
</style>
</head>
<body class="bg-1">
<div class="noise-overlay"></div>

<div class="page-wrapper">

  <!-- HEADER -->
  <div class="header">
    <h1>✦ <em>Study</em> Space</h1>
    <p>your school day <span class="dot">◆</span> beautifully organized</p>
  </div>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="top-bar-section">
      <label>Background</label>
      <div class="bg-swatches">
        <div class="bg-swatch sw1 active" data-bg="bg-1" title="Pic 1 – Purple Dusk"></div>
        <div class="bg-swatch sw2" data-bg="bg-2" title="Pic 2 – Golden Hour"></div>
        <div class="bg-swatch sw3" data-bg="bg-3" title="Pic 3 – Ocean Mint"></div>
        <div class="bg-swatch sw4" data-bg="bg-4" title="Pic 4 – Sunset Rose"></div>
        <div class="bg-swatch sw5" data-bg="bg-5" title="Pic 5 – Cotton Candy"></div>
        <div class="bg-swatch sw6" data-bg="bg-6" title="Pic 6 – Deep Teal"></div>
        <div class="bg-swatch sw7" data-bg="bg-7" title="Pic 7 – Midnight"></div>
        <div class="bg-swatch sw8" data-bg="bg-8" title="Pic 8 – Lavender Sky"></div>
      </div>
    </div>

    <div class="top-bar-section" style="flex-direction: column; align-items: flex-end; gap: 4px;">
      <div class="spotify-row">
        <label>♫</label>
        <input type="text" class="spotify-input" id="spotifyInput" placeholder="Paste Spotify playlist URL…">
        <button class="spotify-btn" onclick="openSpotify()">▶ Play</button>
      </div>
      <div class="spotify-link-display" id="spotifyDisplay">
        Now playing: <a id="spotifyLink" href="#" target="_blank">Open playlist ↗</a>
      </div>
    </div>

    <div class="date-display" id="dateDisplay"></div>
  </div>

  <!-- POMODORO -->
  <div class="pomo-global">
    <div class="pomo-progress-ring">
      <svg width="56" height="56" viewBox="0 0 56 56">
        <circle class="pomo-ring-bg" cx="28" cy="28" r="24"/>
        <circle class="pomo-ring-fg" id="pomoRingFg" cx="28" cy="28" r="24"
          stroke-dasharray="150.8" stroke-dashoffset="0"/>
      </svg>
      <div class="pomo-ring-label" id="pomoRingLabel">—</div>
    </div>
    <div>
      <div class="pomo-title">Pomodoro Timer</div>
      <div class="pomo-phase" id="pomoPhase">Ready to focus</div>
    </div>
    <div class="pomo-timer-display" id="pomoDisplay">25:00</div>
    <div class="pomo-controls">
      <select class="pomo-select" id="pomoModeSelect" onchange="setPomoMode()">
        <option value="25">Focus 25 min</option>
        <option value="50">Focus 50 min</option>
        <option value="5">Break 5 min</option>
        <option value="15">Break 15 min</option>
        <option value="custom">Custom…</option>
      </select>
      <input type="number" id="customMins" class="pomo-select" style="width:64px;display:none;" placeholder="min" min="1" max="120" onchange="applyCustom()">
      <button class="pomo-btn primary" id="pomoStartBtn" onclick="togglePomo()">Start</button>
      <button class="pomo-btn" onclick="resetPomo()">Reset</button>
    </div>
  </div>

  <!-- SCHEDULE -->
  <div class="schedule-header">
    <h2>📚 My Schedule</h2>
    <button class="save-btn" id="saveBtn" onclick="saveData()">Save ✓</button>
  </div>

  <div class="periods-grid" id="periodsGrid"></div>

  <div class="footer">
    <span>Study Space · Made with ♡ · All data saved locally in your browser</span>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
// ── DATA ──
const PERIOD_NAMES = ['Period 1','Period 2','Period 3','Period 4','Period 5','Period 6','Period 7'];
let data = JSON.parse(localStorage.getItem('studyspace') || 'null') || {
  bg: 'bg-1',
  spotify: '',
  periods: PERIOD_NAMES.map((p,i) => ({
    label: p,
    className: '', teacher: '', timeStart: '', timeEnd: '',
    notes: '', todos: []
  }))
};

// ── BG ──
function applyBg(bg) {
  document.body.className = bg;
  document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
  document.querySelector(`[data-bg="${bg}"]`)?.classList.add('active');
  data.bg = bg;
}
document.querySelectorAll('.bg-swatch').forEach(s => {
  s.addEventListener('click', () => { applyBg(s.dataset.bg); saveData(true); });
  s.title = s.title; // keep title for tooltip
});
applyBg(data.bg);

// ── DATE ──
function updateDate() {
  const now = new Date();
  document.getElementById('dateDisplay').textContent =
    now.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'}) +
    ' · ' + now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
}
updateDate(); setInterval(updateDate, 10000);

// ── SPOTIFY ──
document.getElementById('spotifyInput').value = data.spotify || '';
if (data.spotify) showSpotifyDisplay(data.spotify);
function openSpotify() {
  let url = document.getElementById('spotifyInput').value.trim();
  if (!url) { showNotif('Paste a Spotify URL first!'); return; }
  if (!url.startsWith('http')) url = 'https://' + url;
  data.spotify = url; saveData(true);
  showSpotifyDisplay(url);
  window.open(url, '_blank');
}
function showSpotifyDisplay(url) {
  const d = document.getElementById('spotifyDisplay');
  const a = document.getElementById('spotifyLink');
  d.style.display = 'block'; a.href = url;
}

// ── PERIODS ──
function buildPeriods() {
  const grid = document.getElementById('periodsGrid');
  grid.innerHTML = '';
  data.periods.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'period-card';
    card.innerHTML = `
      <div class="period-top">
        <span class="period-badge">Period ${i+1}</span>
        <div class="period-pomo-mini">
          <span class="mini-timer" id="miniTimer${i}">25:00</span>
          <button class="mini-btn" id="miniBtn${i}" onclick="toggleMiniPomo(${i})">▶ Focus</button>
        </div>
      </div>
      <input class="class-name-input" type="text" placeholder="Class name…" data-field="className" data-idx="${i}"
        value="${esc(p.className)}">
      <div class="time-row">
        <span class="time-label">From</span>
        <input class="time-input" type="time" data-field="timeStart" data-idx="${i}" value="${p.timeStart}">
        <span class="time-label">to</span>
        <input class="time-input" type="time" data-field="timeEnd" data-idx="${i}" value="${p.timeEnd}">
      </div>
      <input class="teacher-input" type="text" placeholder="Teacher / room…" data-field="teacher" data-idx="${i}"
        value="${esc(p.teacher)}">
      <div>
        <div class="notes-label">Notes & Homework</div>
        <textarea class="notes-area" placeholder="Write anything you need to remember…" data-field="notes" data-idx="${i}">${esc(p.notes)}</textarea>
      </div>
      <div class="todo-section" id="todos${i}"></div>
      <button class="add-todo-btn" onclick="addTodo(${i})">+ Add task</button>
    `;
    grid.appendChild(card);
    renderTodos(i);
  });

  // live input → save
  grid.querySelectorAll('[data-field]').forEach(el => {
    el.addEventListener('input', () => {
      const idx = +el.dataset.idx, field = el.dataset.field;
      data.periods[idx][field] = el.value;
    });
    el.addEventListener('blur', () => saveData(true));
  });
}

function esc(str) {
  return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── TODOS ──
function renderTodos(idx) {
  const container = document.getElementById(`todos${idx}`);
  if (!container) return;
  container.innerHTML = '';
  (data.periods[idx].todos||[]).forEach((t,ti) => {
    const row = document.createElement('div');
    row.className = 'todo-row';
    row.innerHTML = `
      <input type="checkbox" class="todo-check" ${t.done?'checked':''} onchange="toggleTodo(${idx},${ti})">
      <input type="text" class="todo-text ${t.done?'done':''}" placeholder="Task…"
        value="${esc(t.text)}" oninput="editTodo(${idx},${ti},this.value)" onblur="saveData(true)">
      <button class="todo-del" onclick="delTodo(${idx},${ti})">✕</button>
    `;
    container.appendChild(row);
  });
}
function addTodo(idx) {
  data.periods[idx].todos = data.periods[idx].todos || [];
  data.periods[idx].todos.push({text:'',done:false});
  renderTodos(idx); saveData(true);
  const inputs = document.getElementById(`todos${idx}`).querySelectorAll('.todo-text');
  if (inputs.length) inputs[inputs.length-1].focus();
}
function toggleTodo(idx,ti) {
  data.periods[idx].todos[ti].done = !data.periods[idx].todos[ti].done;
  renderTodos(idx); saveData(true);
}
function editTodo(idx,ti,val) {
  data.periods[idx].todos[ti].text = val;
}
function delTodo(idx,ti) {
  data.periods[idx].todos.splice(ti,1);
  renderTodos(idx); saveData(true);
}

// ── GLOBAL POMODORO ──
let pomoInterval = null;
let pomoSecondsLeft = 25*60;
let pomoTotalSeconds = 25*60;
let pomoRunning = false;
const CIRC = 2 * Math.PI * 24; // 150.796…

function setPomoMode() {
  const val = document.getElementById('pomoModeSelect').value;
  document.getElementById('customMins').style.display = val === 'custom' ? 'inline-block' : 'none';
  if (val !== 'custom') {
    pomoSecondsLeft = parseInt(val) * 60;
    pomoTotalSeconds = pomoSecondsLeft;
    updatePomoDisplay();
    if (pomoRunning) { clearInterval(pomoInterval); pomoRunning = false; document.getElementById('pomoStartBtn').textContent = 'Start'; }
  }
}
function applyCustom() {
  const v = parseInt(document.getElementById('customMins').value) || 25;
  pomoSecondsLeft = v * 60; pomoTotalSeconds = v * 60;
  updatePomoDisplay();
}
function togglePomo() {
  if (pomoRunning) {
    clearInterval(pomoInterval); pomoRunning = false;
    document.getElementById('pomoStartBtn').textContent = 'Resume';
    document.getElementById('pomoPhase').textContent = 'Paused';
  } else {
    if (pomoSecondsLeft <= 0) resetPomo();
    pomoRunning = true;
    document.getElementById('pomoStartBtn').textContent = 'Pause';
    document.getElementById('pomoPhase').textContent = 'Focusing…';
    pomoInterval = setInterval(() => {
      if (pomoSecondsLeft > 0) { pomoSecondsLeft--; updatePomoDisplay(); }
      else { clearInterval(pomoInterval); pomoRunning = false;
        document.getElementById('pomoStartBtn').textContent = 'Start';
        document.getElementById('pomoPhase').textContent = 'Time\'s up! ✦';
        playDing(); showNotif('⏰ Pomodoro complete!');
      }
    }, 1000);
  }
}
function resetPomo() {
  clearInterval(pomoInterval); pomoRunning = false;
  const val = document.getElementById('pomoModeSelect').value;
  pomoSecondsLeft = (val === 'custom' ? parseInt(document.getElementById('customMins').value)||25 : parseInt(val)) * 60;
  pomoTotalSeconds = pomoSecondsLeft;
  document.getElementById('pomoStartBtn').textContent = 'Start';
  document.getElementById('pomoPhase').textContent = 'Ready to focus';
  updatePomoDisplay();
}
function updatePomoDisplay() {
  const m = String(Math.floor(pomoSecondsLeft/60)).padStart(2,'0');
  const s = String(pomoSecondsLeft%60).padStart(2,'0');
  document.getElementById('pomoDisplay').textContent = `${m}:${s}`;
  const pct = pomoTotalSeconds > 0 ? pomoSecondsLeft/pomoTotalSeconds : 1;
  const offset = CIRC * (1 - pct);
  document.getElementById('pomoRingFg').style.strokeDashoffset = offset;
  const minLeft = Math.ceil(pomoSecondsLeft/60);
  document.getElementById('pomoRingLabel').textContent = minLeft <= 0 ? '✓' : minLeft+'m';
}
updatePomoDisplay();

// ── MINI POMODORO (per card) ──
const miniTimers = {}; // idx → {interval, seconds, running}
function toggleMiniPomo(idx) {
  if (!miniTimers[idx]) {
    miniTimers[idx] = { seconds: 25*60, total: 25*60, running: false, interval: null };
  }
  const t = miniTimers[idx];
  const btn = document.getElementById(`miniBtn${idx}`);
  if (t.running) {
    clearInterval(t.interval); t.running = false; btn.textContent = '▶ Focus'; btn.classList.remove('running');
  } else {
    if (t.seconds <= 0) { t.seconds = 25*60; }
    t.running = true; btn.textContent = '⏸ Pause'; btn.classList.add('running');
    t.interval = setInterval(() => {
      if (t.seconds > 0) { t.seconds--; updateMiniDisplay(idx); }
      else {
        clearInterval(t.interval); t.running = false;
        btn.textContent = '▶ Focus'; btn.classList.remove('running');
        showNotif(`⏰ Period ${idx+1} focus done!`); playDing();
      }
    }, 1000);
  }
}
function updateMiniDisplay(idx) {
  const t = miniTimers[idx];
  if (!t) return;
  const m = String(Math.floor(t.seconds/60)).padStart(2,'0');
  const s = String(t.seconds%60).padStart(2,'0');
  const el = document.getElementById(`miniTimer${idx}`);
  if (el) el.textContent = `${m}:${s}`;
}

// ── DING ──
function playDing() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.3,0.6].forEach(delay => {
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine'; o.frequency.value = 880;
      g.gain.setValueAtTime(0.4, ctx.currentTime+delay);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+0.6);
      o.start(ctx.currentTime+delay); o.stop(ctx.currentTime+delay+0.7);
    });
  } catch(e){}
}

// ── SAVE / LOAD ──
function saveData(silent=false) {
  localStorage.setItem('studyspace', JSON.stringify(data));
  if (!silent) {
    showNotif('Saved! ✓');
    const btn = document.getElementById('saveBtn');
    btn.textContent = 'Saved ✓'; btn.classList.add('saved');
    setTimeout(() => { btn.textContent = 'Save ✓'; btn.classList.remove('saved'); }, 1800);
  }
}

// ── NOTIF ──
function showNotif(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2600);
}

// ── INIT ──
buildPeriods();
</script>
